        .tv-icon { width: 24px; height: 24px; fill: #787b86; cursor: pointer; transition: fill 0.2s; }

        // 賽道資料
        const trackLength = 15000;
        let candlesticks = [], maPoints = [], volumes = [];
        
        // 攝影機物件 (相對於世界座標)
        let camera = { x: 0, y: 0 };
        const cameraZoom = 0.55;

        function generateMap() {
            candlesticks = []; maPoints = []; volumes = [];
            let currentPrice = 300;
            const pointsCount = 180;
            const stepX = trackLength / pointsCount;
            let currentDate = new Date('2024-01-01');
            
            for (let i = 0; i <= pointsCount; i++) {
                let open = currentPrice;
                let change = (Math.random() - 0.5) * 45;
                if (i === 30) change = -200; // 暴跌
                if (i === 70) change = 180;  // 暴噴
                if (i === 120) change = -150; 
                
                let close = open + change;
                let high = Math.max(open, close) + Math.random() * 25;
                let low = Math.min(open, close) - Math.random() * 25;
                let vol = Math.random() * 100 + (Math.abs(change) > 100 ? 200 : 0);
                
                let dateStr = currentDate.toISOString().split('T')[0];
                candlesticks.push({ x: i * stepX, open, close, high, low, date: dateStr });
                volumes.push(vol);
                currentPrice = close;
                currentDate.setDate(currentDate.getDate() + 1 + Math.floor(Math.random() * 2));
            }

            for (let i = 0; i < candlesticks.length; i++) {
                let sum = 0, count = 0;
                for (let j = Math.max(0, i - 4); j <= i; j++) { sum += candlesticks[j].close; count++; }
                let ma = sum / count;
                maPoints.push({ x: candlesticks[i].x, y: 700 - ma }); 
            }
        }

        function getTrackData(x) {
            if (x <= 0) return { y: maPoints[0].y, angle: 0 };
            if (x >= trackLength) return { y: maPoints[maPoints.length-1].y, angle: 0 };
            for (let i = 0; i < maPoints.length - 1; i++) {
                if (x >= maPoints[i].x && x < maPoints[i+1].x) {
                    const p1 = maPoints[i], p2 = maPoints[i+1];
                    const t = (x - p1.x) / (p2.x - p1.x);
                    return { y: p1.y + t * (p2.y - p1.y), angle: Math.atan2(p2.y - p1.y, p2.x - p1.x) };
                }
            }
            return { y: 0, angle: 0 };
        }

        let bike = {
            x: 50, y: 0, vx: 0, vy: 0, angle: 0, 
            isGasBtnDown: false, isAirborne: false, spinSpeed: 0,
            isCrashed: false, crashTimer: 0, 
            finished: false, finishTime: 0,
            memeTriggerXs: [], isMemeFrozen: false, memeTimer: 0, memeText: ""
        };
        let startTime = 0;

        function resetBike() {
            bike = { 
                x: 50, y: maPoints[0]?.y || 0, vx: 0, vy: 0, angle: 0, 
                isGasBtnDown: false, isAirborne: false, spinSpeed: 0, 
                isCrashed: false, crashTimer: 0, finished: false, finishTime: 0,
                memeTriggerXs: [], isMemeFrozen: false, memeTimer: 0, memeText: ""
            };
            
            // 每一場保證觸發 1 到 3 次崩潰迷因
            let memeCount = Math.floor(Math.random() * 3) + 1;

                // 隨機分配在賽道 10% ~ 90% 的位置
                bike.memeTriggerXs.push(trackLength * (0.1 + Math.random() * 0.8));

            bike.memeTriggerXs.sort((a, b) => a - b);

            lastTime = 0;
            camera = { x: 0, y: bike.y - UI.canvas.height / 2 / cameraZoom }; // 重置相機
            document.getElementById('crash-warning').classList.add('hidden');
        }

        function setupPeerEvents(targetPeer) {
            targetPeer.on('open', (id) => {
                myId = id;
                players[myId] = { name: myName, x: 50, y: 0, rot: 0, color: myColor, finished: false, crashed: false, memeFrozen: false, memeTxt: "" };
                updatePlayerList();
                UI.displayId.textContent = id;
                if(isHost) { UI.btnStart.classList.remove('hidden'); UI.waitingText.classList.add('hidden'); }
            });
        }

        document.getElementById('btnCreateRoom').onclick = () => {
            if (!UI.nameInput.value.trim()) return showWarning('請輸入你的 ID');
            myName = UI.nameInput.value.trim(); localStorage.setItem('playerName', myName);
            isHost = true;
            const reqId = UI.customRoomId.value.trim() || undefined;
            peer = new Peer(reqId, { debug: 1 });
            
            UI.joinOptions.classList.add('hidden'); UI.waiting.classList.remove('hidden');
            setupPeerEvents(peer);
            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => handleHostData(conn, data));
            });
        };

        document.getElementById('btnJoinRoom').onclick = () => {
            if (!UI.nameInput.value.trim()) return showWarning('請輸入你的 ID');
            const roomId = UI.roomIdInput.value.trim();
            if (!roomId) return showWarning('請輸入朋友房號');
            
            myName = UI.nameInput.value.trim(); localStorage.setItem('playerName', myName);
            isHost = false; peer = new Peer({ debug: 1 });
            UI.joinOptions.classList.add('hidden'); UI.waiting.classList.remove('hidden');
            setupPeerEvents(peer);

            setTimeout(() => {
                hostConnection = peer.connect(roomId);
                hostConnection.on('open', () => {
                    UI.displayId.textContent = roomId;
                    hostConnection.send({ type: 'join', id: myId, name: myName, color: myColor });
                });
                hostConnection.on('data', (data) => handleClientData(data));
            }, 1000);
        };

        UI.btnCopyLink.onclick = () => {
            const url = window.location.origin + window.location.pathname + '?room=' + UI.displayId.textContent;
            navigator.clipboard.writeText(url); showWarning("✅ 邀請連結已複製！");
        };

        UI.btnStart.onclick = () => {
            if (isHost) {
                generateMap();
                connections.forEach(c => c.send({ type: 'start_game', candles: candlesticks, ma: maPoints, vols: volumes })); 
                startGame();
            }
        };

        UI.btnRematch.onclick = () => {
            if (isHost) {
                generateMap();
                connections.forEach(c => c.send({ type: 'rematch', candles: candlesticks, ma: maPoints, vols: volumes }));
                prepareRematch();
            }
        };

        function handleHostData(conn, data) {
            if (data.type === 'join') {
                players[data.id] = { name: data.name, x: 50, y: 0, rot: 0, color: data.color, finished: false, crashed: false, memeFrozen: false, memeTxt: "" };
                updatePlayerList();
                connections.forEach(c => c.send({ type: 'update_players', players: players }));
            }
            if (data.type === 'sync') {
                if (players[data.id]) {
                    players[data.id].x = data.x; players[data.id].y = data.y; players[data.id].rot = data.rot; 
                    players[data.id].crashed = data.crashed; players[data.id].finished = data.finished;
                    players[data.id].memeFrozen = data.memeFrozen; players[data.id].memeTxt = data.memeTxt;
                    if(data.finished && !players[data.id].finishTime) players[data.id].finishTime = data.time;
                }
            }
        }

        function handleClientData(data) {
            if (data.type === 'update_players') { players = data.players; updatePlayerList(); }
            if (data.type === 'start_game' || data.type === 'rematch') { 
                candlesticks = data.candles; maPoints = data.ma; volumes = data.vols;
                if (data.type === 'start_game') startGame(); else prepareRematch();
            }
            if (data.type === 'sync_all') {
                for (let id in data.players) {
                    if (id !== myId && players[id]) {
                        players[id].x = data.players[id].x; players[id].y = data.players[id].y; 
                        players[id].rot = data.players[id].rot; players[id].crashed = data.players[id].crashed;
                        players[id].finished = data.players[id].finished; players[id].finishTime = data.players[id].finishTime;
                        players[id].memeFrozen = data.players[id].memeFrozen; players[id].memeTxt = data.players[id].memeTxt;
                    }
                }
            }
        }

        function updatePlayerList() {
            UI.playerList.innerHTML = '';
            for (let id in players) {
                const li = document.createElement('li');
                li.innerHTML = `<span style="color:${players[id].color}">■</span> ${players[id].name} ${id===myId?'(你)':''}`;
                UI.playerList.appendChild(li);
            }
        }

        function startGame() {
            UI.container.classList.remove('bg-[#ffffff]', 'bg-opacity-95');
            UI.container.classList.add('pointer-events-none', 'bg-transparent');
            UI.lobby.classList.add('hidden'); UI.result.classList.add('hidden'); UI.hud.classList.remove('hidden');
            resetBike(); resizeCanvas(); startTime = Date.now();
            
            const pressGas = (e) => { if(e) e.preventDefault(); bike.isGasBtnDown = true; };
            const releaseGas = (e) => { if(e) e.preventDefault(); bike.isGasBtnDown = false; };
            
            UI.btnGas.ontouchstart = pressGas; UI.btnGas.ontouchend = releaseGas;
            UI.btnGas.onmousedown = pressGas; window.onmouseup = releaseGas;
            window.onkeydown = (e) => { if(e.key === ' ' || e.key === 'ArrowRight') pressGas(); };
            window.onkeyup = (e) => { if(e.key === ' ' || e.key === 'ArrowRight') releaseGas(); };
            
            requestAnimationFrame(gameLoop);
        }

        function prepareRematch() {
            for(let id in players) { players[id].finished = false; players[id].finishTime = 0; }
            startGame();
        }

        window.addEventListener('resize', resizeCanvas);
        function resizeCanvas() { UI.canvas.width = window.innerWidth; UI.canvas.height = window.innerHeight; }

        function updatePhysics(dt) {
            if (bike.finished) return;
            let dtMultiplier = dt * 60; 

            // 迷因發作：突然煞車並大喊 (保證發作)
            if (bike.memeTriggerXs.length > 0 && bike.x > bike.memeTriggerXs[0]) {
                bike.memeTriggerXs.shift(); // 移除已經發作過的點
                bike.isMemeFrozen = true;
                bike.memeTimer = 1.5; // 定格 1.5 秒
                bike.memeText = memeQuotes[Math.floor(Math.random() * memeQuotes.length)];
                bike.vx = 0; bike.vy = 0;
            }

            if (bike.isMemeFrozen) {
                bike.memeTimer -= dt;
                if (bike.memeTimer <= 0) bike.isMemeFrozen = false;
                return; // 定格期間跳過物理運算
            }

            if (bike.isCrashed) {
                bike.crashTimer -= dt;
                let trackA = getTrackData(bike.x).angle;
                bike.angle += (trackA - bike.angle) * 0.05 * dtMultiplier;
                if (bike.crashTimer <= 0) {
                    bike.isCrashed = false;
                    document.getElementById('crash-warning').classList.add('hidden');
                }
            } else {
                bike.vy += 0.5 * dtMultiplier; // 重力
                let trackInfo = getTrackData(bike.x);

                if (!bike.isAirborne && bike.isGasBtnDown) {
                    let accel = 0.55 * dtMultiplier;
                    bike.vx += accel * Math.cos(trackInfo.angle);
                    bike.vy += accel * Math.sin(trackInfo.angle);
                }

                bike.x += bike.vx * dtMultiplier;
                bike.y += bike.vy * dtMultiplier;

                let newTrackInfo = getTrackData(bike.x);
                if (bike.y >= newTrackInfo.y) {
                    if (bike.isAirborne) {
                        let nAngle = Math.atan2(Math.sin(bike.angle), Math.cos(bike.angle));
                        let nTrackAngle = Math.atan2(Math.sin(newTrackInfo.angle), Math.cos(newTrackInfo.angle));
                        let diff = Math.abs(nAngle - nTrackAngle);
                        if (diff > Math.PI) diff = 2 * Math.PI - diff; 
                        
                        // 跌倒判定 (大於 35度)
                        if (diff > 0.6) {
                            bike.isCrashed = true;
                            bike.crashTimer = 1.0; 
                            bike.vx *= 0.1; bike.vy = 0;
                            document.getElementById('crash-warning').classList.remove('hidden');
                        }
                    }

                    if (!bike.isCrashed) {
                        bike.isAirborne = false;
                        bike.y = newTrackInfo.y;
                        bike.angle = newTrackInfo.angle; 

                        let speedAlongTrack = bike.vx * Math.cos(newTrackInfo.angle) + bike.vy * Math.sin(newTrackInfo.angle);
                        speedAlongTrack *= Math.pow(0.99, dtMultiplier); 
                        if (!bike.isGasBtnDown) speedAlongTrack *= Math.pow(0.95, dtMultiplier); 

                        // 最高速限限制為 18
                        if (speedAlongTrack > 18) speedAlongTrack = 18;
                        if (speedAlongTrack < -3) speedAlongTrack = -3;

                        bike.vx = speedAlongTrack * Math.cos(newTrackInfo.angle);
                        bike.vy = speedAlongTrack * Math.sin(newTrackInfo.angle);
                    }
                } else {
                    if (!bike.isAirborne) bike.spinSpeed = bike.vx * 0.005; 
                    bike.isAirborne = true;
                    // 在空中死按著油門會瘋狂前空翻
                    if (bike.isGasBtnDown) bike.spinSpeed += 0.003 * dtMultiplier;
                    bike.angle += bike.spinSpeed * dtMultiplier;
                }
            }

            const progress = Math.min(100, Math.floor((bike.x / trackLength) * 100));
            document.getElementById('hud-dist').textContent = `${progress}%`;
            
            let currentCandle = candlesticks.find(c => c.x >= bike.x);
            if(currentCandle && Math.floor(Date.now() / 200) % 2 === 0) {
                UI.tvO.textContent = currentCandle.open.toFixed(2); UI.tvH.textContent = currentCandle.high.toFixed(2);
                UI.tvL.textContent = currentCandle.low.toFixed(2);
                UI.tvC.textContent = (currentCandle.close + (Math.random()-0.5)*2).toFixed(2);
                UI.tvC.className = currentCandle.close >= currentCandle.open ? 'text-[#089981]' : 'text-[#f23645]';
            }
        }

        function drawTradingViewChart() {
            // 平滑更新世界相機 (鎖定玩家為中心稍微偏左)
            let targetCamX = bike.x - (UI.canvas.width * 0.3) / cameraZoom;
            let targetCamY = bike.y - (UI.canvas.height * 0.4) / cameraZoom;
            // 防止相機超出起點
            if (targetCamX < 0) targetCamX = 0; 

            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, UI.canvas.width, UI.canvas.height);
            
            ctx.save();
            ctx.scale(cameraZoom, cameraZoom);
            ctx.translate(-camera.x, -camera.y); // 將畫布移動到世界相機位置

            // 1. 繪製絕對靜止的背景網格 (根據相機視角)
            ctx.strokeStyle = '#f0f3fa'; ctx.lineWidth = 1 / cameraZoom;
            const left = camera.x, right = camera.x + UI.canvas.width / cameraZoom;
            const top = camera.y, bottom = camera.y + UI.canvas.height / cameraZoom;
            
            for(let i = Math.floor(left/150)*150; i < right; i+=150) { ctx.beginPath(); ctx.moveTo(i, top); ctx.lineTo(i, bottom); ctx.stroke(); }
            for(let j = Math.floor(top/80)*80; j < bottom; j+=80) { ctx.beginPath(); ctx.moveTo(left, j); ctx.lineTo(right, j); ctx.stroke(); }
            
            // 2. 浮水印
            ctx.fillStyle = 'rgba(240, 243, 250, 0.8)';
            ctx.font = 'bold 200px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("TSLA", left + (right - left)/2, top + (bottom - top)/2);

            // 3. 繪製底部成交量與 K 線
            candlesticks.forEach((c, idx) => {
                if (c.x > left - 100 && c.x < right + 100) {
                    const isUp = c.close >= c.open;
                    const color = isUp ? '#089981' : '#f23645'; 
                    const vHeight = volumes[idx] * 0.5;
                    ctx.fillStyle = isUp ? 'rgba(8, 153, 129, 0.3)' : 'rgba(242, 54, 69, 0.3)';
                    ctx.fillRect(c.x - 6, 1100 - vHeight, 12, vHeight); // 量
                    
                    ctx.strokeStyle = color; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(c.x, 700 - c.high); ctx.lineTo(c.x, 700 - c.low); ctx.stroke(); // 影線
                    
                    ctx.fillStyle = color;
                    let bodyTop = 700 - Math.max(c.open, c.close);
                    let bodyHeight = Math.max(2, Math.abs(c.close - c.open));
                    ctx.fillRect(c.x - 12, bodyTop, 24, bodyHeight); // 實體
                }
            });

            // 4. 繪製 5 日均線賽道
            ctx.beginPath(); ctx.lineWidth = 8; ctx.lineJoin = "round";
            for (let i = 0; i < maPoints.length - 1; i++) {
                if (maPoints[i].x > left - 200 && maPoints[i].x < right + 200) {
                    if(i === 0 || maPoints[i-1].x <= left - 200) ctx.moveTo(maPoints[i].x, maPoints[i].y);
                    ctx.lineTo(maPoints[i+1].x, maPoints[i+1].y);
                }
            }
            ctx.strokeStyle = '#2962ff'; ctx.shadowColor = 'rgba(41, 98, 255, 0.4)'; ctx.shadowBlur = 15;
            ctx.stroke(); ctx.shadowBlur = 0;
            
            // 5. 畫終點紅旗
            if (trackLength > left && trackLength < right + 500) {
                const finishY = maPoints[maPoints.length-1].y;
                ctx.fillStyle = '#787b86'; ctx.fillRect(trackLength, finishY - 200, 6, 200); // 旗桿
                ctx.fillStyle = '#f23645'; 
                ctx.beginPath(); ctx.moveTo(trackLength + 6, finishY - 190); ctx.lineTo(trackLength + 80, finishY - 160); ctx.lineTo(trackLength + 6, finishY - 130); ctx.fill(); // 紅旗
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'left'; ctx.fillText('FINISH', trackLength + 12, finishY - 155);
            }
            ctx.restore();

            // 6. UI 層: 底部日期 X 軸
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, UI.canvas.height - 30, UI.canvas.width, 30);
            ctx.strokeStyle = '#e0e3eb'; ctx.beginPath(); ctx.moveTo(0, UI.canvas.height - 30); ctx.lineTo(UI.canvas.width, UI.canvas.height - 30); ctx.stroke();
            
            ctx.fillStyle = '#787b86'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            let lastMonth = ""; 
            candlesticks.forEach(c => {
                const screenX = (c.x - camera.x) * cameraZoom;
                if (screenX > 0 && screenX < UI.canvas.width) {
                    const monthKey = c.date.substring(0, 7); // YYYY-MM
                    if (monthKey !== lastMonth) {
                        ctx.beginPath(); ctx.moveTo(screenX, UI.canvas.height - 30); ctx.lineTo(screenX, UI.canvas.height - 25); ctx.stroke();
                        ctx.fillText(monthKey.replace('-', '年') + '月', screenX, UI.canvas.height - 15);
                        lastMonth = monthKey;
                    }
                }
            });

            // 7. UI 層: 右側價格 Y 軸
            ctx.fillStyle = '#ffffff'; ctx.fillRect(UI.canvas.width - 60, 50, 60, UI.canvas.height - 80);
            ctx.strokeStyle = '#e0e3eb'; ctx.beginPath(); ctx.moveTo(UI.canvas.width - 60, 50); ctx.lineTo(UI.canvas.width - 60, UI.canvas.height - 30); ctx.stroke();
            ctx.fillStyle = '#131722'; ctx.font = '11px Arial'; ctx.textAlign = 'right';
            for(let j=0; j<UI.canvas.height; j+=80) {
                let simPrice = (700 - (camera.y + (j - 50) / cameraZoom)).toFixed(1);
                ctx.fillText(simPrice, UI.canvas.width - 8, j + 4 + 50);
            }
        }

        function drawBicycle(x, y, angle, color, name, isCrashed, isFrozen, memeTxt) {
            ctx.save();
            ctx.scale(cameraZoom, cameraZoom);
            ctx.translate((x - camera.x), (y - camera.y)); // 依據世界相機定位
            
            // 繪製迷因對話框 (不受旋轉影響)
            if (isFrozen && memeTxt) {
                ctx.save();
                ctx.translate(0, -160); // 往上移，避免擋住 ID
                ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#131722'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.roundRect(-250, -60, 500, 80, 15); ctx.fill(); ctx.stroke(); // 泡泡變大
                ctx.beginPath(); ctx.moveTo(-15, 20); ctx.lineTo(0, 45); ctx.lineTo(15, 20); ctx.fill(); ctx.stroke(); // 尾巴
                ctx.fillStyle = '#f23645'; ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; // 字體放大為 40px
                ctx.fillText(memeTxt, 0, -20, 480); // 加上 max-width 防止爆框
                ctx.restore();
            }

            ctx.rotate(angle);
            const riderScale = 2;
            ctx.scale(riderScale, riderScale);

            // 名字 ID (所有人都顯示名字，上移至 -110 避開頭部)
            ctx.fillStyle = color; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(name, 0, -110);

            // 車身
            ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.arc(-22, -10, 10, 0, Math.PI*2); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(22, -10, 10, 0, Math.PI*2); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-22, -10); ctx.lineTo(-6, -30); ctx.lineTo(12, -30); ctx.lineTo(22, -10); 
            ctx.moveTo(12, -30); ctx.lineTo(0, -10); ctx.lineTo(-22, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-10, -30); ctx.lineTo(-2, -30); ctx.lineWidth = 6; ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(12, -30); ctx.lineTo(10, -40); ctx.lineTo(16, -40); ctx.lineWidth = 5; ctx.stroke(); 

            // 火柴人
            ctx.strokeStyle = '#131722'; ctx.fillStyle = '#131722'; ctx.lineWidth = 5;
            if (isCrashed) { ctx.translate(10, -15); ctx.rotate(Math.PI / 2); }
            ctx.beginPath(); ctx.arc(0, -55, 7, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, -48); ctx.lineTo(-4, -30); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -42); ctx.lineTo(12, -40); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-4, -30); ctx.lineTo(0, -20); ctx.lineTo(0, -10); ctx.stroke();

            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1; 
            
            updatePhysics(dt);
            drawTradingViewChart();

            for (let id in players) {
                if (id !== myId) {
                    const p = players[id];
                    drawBicycle(p.x, p.y, p.rot, p.color, p.name, p.crashed, p.memeFrozen, p.memeTxt);
                }
            }
            drawBicycle(bike.x, bike.y, bike.angle, myColor, myName, bike.isCrashed, bike.isMemeFrozen, bike.memeText);

            syncNetwork(); checkFinish();
            if (!bike.finished || isHost) gameLoopId = requestAnimationFrame(gameLoop);
        }

        function syncNetwork() {
            if (Math.floor(Date.now() / 50) % 2 === 0) {
                const myState = { type: 'sync', id: myId, x: bike.x, y: bike.y, rot: bike.angle, crashed: bike.isCrashed, finished: bike.finished, time: bike.finishTime, memeFrozen: bike.isMemeFrozen, memeTxt: bike.memeText };
                if (isHost) {
                    players[myId].x = bike.x; players[myId].y = bike.y; players[myId].rot = bike.angle; 
                    players[myId].crashed = bike.isCrashed; players[myId].finished = bike.finished;
                    players[myId].memeFrozen = bike.isMemeFrozen; players[myId].memeTxt = bike.memeText;
                    if(bike.finished && !players[myId].finishTime) players[myId].finishTime = bike.finishTime;
                    connections.forEach(c => c.send({ type: 'sync_all', players: players }));
                } else {
                    if (hostConnection && hostConnection.open) hostConnection.send(myState);
                }
            }
        }

        function checkFinish() {
            if (!bike.finished && bike.x >= trackLength) {
                bike.finished = true; bike.finishTime = Date.now() - startTime;
                setTimeout(checkAllFinished, 1000);
            }
        }

        function checkAllFinished() {
            let allDone = true, results = [];
            for (let id in players) {
                if (!players[id].finished) allDone = false;
                else results.push({ name: players[id].name, time: players[id].finishTime });
            }

            if (allDone && results.length > 0) {
                cancelAnimationFrame(gameLoopId);
                UI.hud.classList.add('hidden'); UI.container.classList.remove('pointer-events-none', 'bg-transparent'); UI.container.classList.add('bg-[#ffffff]', 'bg-opacity-90'); UI.result.classList.remove('hidden');
                if (isHost) { UI.btnRematch.classList.remove('hidden'); UI.btnWaitRematch.classList.add('hidden'); } 
                else { UI.btnRematch.classList.add('hidden'); UI.btnWaitRematch.classList.remove('hidden'); }

                results.sort((a, b) => a.time - b.time);
                UI.board.innerHTML = '';
                results.forEach((r, index) => {
                    const isLoser = index === results.length - 1;
                    const el = document.createElement('div');
                    el.className = `flex justify-between p-3 rounded font-bold ${isLoser ? 'bg-[#fff0f0] text-[#f23645]' : 'bg-white text-[#131722]'}`;
                    el.innerHTML = `<span>#${index + 1} ${r.name}</span> <span class="font-mono">${(r.time / 1000).toFixed(2)}s</span>`;
                    UI.board.appendChild(el);
                    if (isLoser) UI.loserName.textContent = r.name;
                });
            } else if (bike.finished) setTimeout(checkAllFinished, 1000); 
        }
    </script>
