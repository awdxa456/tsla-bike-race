<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Bicycle Race</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        .hidden { display: none !important; }
        
        /* 手機端按鈕樣式 */
        .control-btn {
            background: rgba(33, 150, 243, 0.2); border: 3px solid rgba(33, 150, 243, 0.8); color: #1e88e5;
            border-radius: 50%; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; user-select: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); backdrop-filter: blur(4px);
        }
        .control-btn:active { background: rgba(33, 150, 243, 0.5); transform: scale(0.92); }

        /* TradingView 左側工具列模擬 */
        .tv-sidebar { border-right: 1px solid #e0e3eb; background: #fff; width: 50px; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .tv-icon { width: 24px; height: 24px; border-radius: 4px; background: #f0f3fa; }
    </style>
</head>
<body>

    <!-- TradingView 頂部選單 (常駐顯示) -->
    <div id="tv-header" class="absolute top-0 left-0 w-full bg-white border-b border-gray-200 flex items-center px-4 py-2 z-20 shadow-sm pointer-events-none">
        <div class="flex items-center gap-4 text-sm font-semibold">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-600 text-white rounded-full flex items-center justify-center font-black text-lg shadow-inner">T</div>
                <span class="text-lg">TSLA</span>
            </div>
            <span class="text-gray-400">|</span>
            <span>1天</span>
            <span class="text-gray-400">|</span>
            <span class="text-blue-500 bg-blue-50 px-2 py-1 rounded">技術指標</span>
            <span class="text-gray-400 hidden sm:inline">|</span>
            <span class="text-gray-800 hidden sm:inline">Tesla, Inc. · NASDAQ</span>
        </div>
    </div>

    <!-- 左側工具列 (常駐顯示) -->
    <div class="absolute top-[50px] left-0 h-full tv-sidebar z-10 pointer-events-none hidden md:flex">
        <div class="tv-icon"></div><div class="tv-icon"></div><div class="tv-icon"></div>
        <div class="tv-icon"></div><div class="tv-icon"></div><div class="tv-icon"></div>
    </div>

    <!-- 遊戲畫布 -->
    <canvas id="gameCanvas" class="hidden"></canvas>

    <!-- UI 介面層 -->
    <div id="ui-container" class="ui-layer interactive items-center justify-center bg-black bg-opacity-60 p-4 z-30">
        
        <!-- 1. 登入與大廳畫面 -->
        <div id="lobby-screen" class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center border border-gray-200">
            <h1 class="text-3xl font-black mb-2 text-gray-800 border-b border-gray-200 pb-4">🚲 Stock Bicycle Race</h1>
            <p class="text-gray-500 mb-6 text-sm">跌倒、破產、或是今晚買單</p>
            
            <input type="text" id="playerName" placeholder="輸入你的大名" class="w-full p-3 mb-4 bg-gray-50 text-gray-800 rounded outline-none border border-gray-300 focus:border-blue-500 text-center text-lg font-bold" maxlength="10">
            
            <div id="join-options" class="flex flex-col gap-3">
                <button id="btnCreateRoom" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded font-bold transition text-lg shadow-lg">🏠 建立新賽局</button>
                <div class="flex items-center gap-2">
                    <hr class="flex-grow border-gray-300"><span class="text-gray-400 text-sm">或</span><hr class="flex-grow border-gray-300">
                </div>
                <div class="flex gap-2">
                    <input type="text" id="roomIdInput" placeholder="輸入房號" class="w-2/3 p-3 bg-gray-50 border border-gray-300 text-gray-800 rounded outline-none text-center font-bold">
                    <button id="btnJoinRoom" class="w-1/3 bg-green-600 hover:bg-green-500 text-white rounded font-bold transition shadow">加入</button>
                </div>
            </div>

            <!-- 房間內等待畫面 -->
            <div id="room-waiting" class="hidden flex-col items-center">
                <h2 class="text-xl text-gray-800 font-bold mb-2">房號: <span id="displayRoomId" class="tracking-widest text-blue-600 bg-blue-50 px-3 py-1 rounded select-all border border-blue-200"></span></h2>
                <div class="w-full bg-gray-50 border border-gray-200 rounded p-4 mb-6 min-h-[100px] text-left shadow-inner">
                    <h3 class="text-gray-500 text-sm mb-2 font-bold border-b pb-1">準備開飆的韭菜：</h3>
                    <ul id="playerList" class="space-y-2 font-bold text-gray-700 text-lg"></ul>
                </div>
                <button id="btnStartGame" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white rounded font-black text-xl transition shadow-xl hidden">🏁 開始比賽！</button>
                <p id="waitingText" class="text-gray-500 animate-pulse font-bold mt-2">等待主辦人開始...</p>
            </div>
        </div>

        <!-- 2. 遊戲內控制 (手機端 UI) -->
        <div id="game-hud" class="hidden w-full h-full flex-col justify-end p-6 pointer-events-none pb-12 pl-12 md:pl-24 relative">
            <div class="flex justify-end items-end pointer-events-auto">
                <button id="btnGas" class="control-btn bg-white">GO!</button>
            </div>
        </div>

        <!-- 3. 結算畫面 -->
        <div id="result-screen" class="hidden bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center border-4 border-gray-800">
            <h1 class="text-4xl font-black mb-6 text-gray-800">🏁 比賽結束</h1>
            <div id="leaderboard" class="w-full bg-gray-50 border border-gray-300 rounded p-4 mb-6 text-left space-y-3 shadow-inner">
                <!-- 排行榜動態生成 -->
            </div>
            <div id="loser-pays" class="bg-red-50 border-4 border-red-500 p-6 rounded-lg mb-6 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-full bg-red-500 opacity-10 animate-pulse"></div>
                <h2 class="text-3xl font-black text-red-600 relative z-10">🚨 還不去結帳 🚨</h2>
                <p class="text-lg font-bold text-red-500 mt-1 relative z-10">Go pay the bill, loser!</p>
                <p id="loserName" class="text-5xl font-black text-gray-900 mt-4 relative z-10 drop-shadow-md">某某某</p>
            </div>
            <button id="btnRestart" class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-white rounded font-bold transition text-xl shadow-lg hidden">🔄 再戰一局</button>
        </div>
    </div>

    <script>
        const myNameInput = document.getElementById('playerName');
        const uiContainer = document.getElementById('ui-container');
        const lobbyScreen = document.getElementById('lobby-screen');
        const joinOptions = document.getElementById('join-options');
        const roomWaiting = document.getElementById('room-waiting');
        const displayRoomId = document.getElementById('displayRoomId');
        const playerList = document.getElementById('playerList');
        const btnStartGame = document.getElementById('btnStartGame');
        const waitingText = document.getElementById('waitingText');
        const gameCanvas = document.getElementById('gameCanvas');
        const gameHud = document.getElementById('game-hud');
        const btnGas = document.getElementById('btnGas');
        const btnRestart = document.getElementById('btnRestart');
        const ctx = gameCanvas.getContext('2d');

        let myName = ""; let peer = null; let isHost = false;
        let connections = []; let hostConnection = null;
        let players = {}; let myId = null; let gameLoopId = null;
        let lastTime = 0;

        const myColor = `hsl(${Math.random() * 360}, 80%, 50%)`;

        // 100句迷因題庫
        const memeQuotes = [
            "F**k, give my money back!", "Where is my Lambo?!", "Elon lied to me!", 
            "To the moon? More like to the core!", "I bought the dip, but it kept dipping!", 
            "Margin call? I don't answer calls.", "Diamond hands! 💎🙌", "Wife left me, but I still hold TSLA.",
            "Cybercab is just a myth!", "FSD = Fully Scam Driving?", "Buy high, sell low!",
            "I am financially ruined.", "Just one more Elon tweet...", "Is this the bottom?",
            "SpaceX crashed and so did my portfolio.", "Cathie Wood said $2000!", "HODL until I die.",
            "I should have bought NVDA.", "This is fine. 🐶🔥", "Wen moon?", 
            "My stop loss was ignored!", "Short squeeze coming... right?", "I trust the plan.",
            "Doge is my only hope now.", "I am eating noodles for a month.", "Funding secured at $420!",
            "It's just a healthy correction.", "The market is manipulated!", "Can I get a refund on my stocks?",
            "I average down every day.", "Why is it always red?", "I love the pain.",
            "Just deleted my brokerage app.", "Bull trap again!", "Bear market is over... SIKE!",
            "My portfolio is a horror movie.", "I am a long-term investor now (forced).", "SEC do something!",
            "Papa Elon save me!", "I sold my kidney for this.", "Let me speak to the CEO of Stock Market.",
            "At least I have my health... oh wait.", "R.I.P my savings.", "I am a meme now.",
            // ... (為確保流暢運行，填充精華語錄)
            "Mom, I need a loan.", "My chart is upside down.", "I am buying the dip's dip.",
            "This stock is cursed.", "I need a drink.", "I'm not crying, you're crying."
        ];

        // TSLA 真實走勢軌跡產生器 (2024/01 ~ 2026/05)
        const trackLength = 25000;
        const trackPoints = [];
        const dateLabels = [];
        let startDate = new Date('2024-01-01');

        const milestones = [
            [0, 250], [30, 160], [70, 260], [110, 200], [150, 350], [180, 280], [200, 390]
        ];
        
        function getBasePrice(idx) {
            for (let j = 0; j < milestones.length - 1; j++) {
                if (idx >= milestones[j][0] && idx <= milestones[j+1][0]) {
                    const t = (idx - milestones[j][0]) / (milestones[j+1][0] - milestones[j][0]);
                    return milestones[j][1] + t * (milestones[j+1][1] - milestones[j][1]);
                }
            }
            return 390;
        }

        for (let i = 0; i <= 200; i++) {
            let x = i * (trackLength / 200);
            if (i % 15 === 0) {
                let monthsToAdd = (i / 200) * 28; 
                let d = new Date(startDate); d.setMonth(startDate.getMonth() + monthsToAdd);
                dateLabels.push({ x: x, text: `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}` });
            }
            let basePrice = getBasePrice(i);
            let noise = i === 0 ? 0 : (Math.random() - 0.5) * 25; 
            let finalPrice = basePrice + noise;
            let y = 3000 - finalPrice * 5;
            trackPoints.push({ x: x, y: y });
        }
        trackPoints.push({ x: trackLength + 1000, y: trackPoints[trackPoints.length-1].y });

        function getTrackData(x) {
            if (x <= 0) return { y: trackPoints[0].y, angle: 0 };
            if (x >= trackLength) return { y: trackPoints[trackPoints.length-1].y, angle: 0 };
            for (let i = 0; i < trackPoints.length - 1; i++) {
                if (x >= trackPoints[i].x && x < trackPoints[i+1].x) {
                    const p1 = trackPoints[i]; const p2 = trackPoints[i+1];
                    const t = (x - p1.x) / (p2.x - p1.x);
                    return { 
                        y: p1.y + t * (p2.y - p1.y), 
                        angle: Math.atan2(p2.y - p1.y, p2.x - p1.x) 
                    };
                }
            }
            return { y: 0, angle: 0 };
        }

        // 摩托車物理狀態
        let bike = {
            x: 100, y: 0, vx: 0, vy: 0, angle: 0, 
            isGasBtnDown: false,
            isAirborne: false, isCrashed: false, crashTimer: 0,
            finished: false, finishTime: 0,
            // 迷因系統
            isMemeFrozen: false, memeTimer: 0, memeText: "", hasSpoken: false,
            memeTriggers: [] 
        };
        let startTime = 0;

        function initPeer() {
            peer = new Peer({ debug: 2 });
            peer.on('open', (id) => {
                myId = isHost ? (document.getElementById('roomIdInput').value || id) : id;
                players[myId] = { name: myName, x: 100, y: 0, rot: 0, color: myColor, finished: false, isMemeFrozen: false, memeText: "" };
                updatePlayerList();
                if(isHost) {
                    displayRoomId.textContent = myId;
                    btnStartGame.classList.remove('hidden'); waitingText.classList.add('hidden');
                }
            });

            peer.on('connection', (conn) => {
                if (isHost) { connections.push(conn); conn.on('data', (data) => handleHostData(conn, data)); }
            });
        }

        document.getElementById('btnCreateRoom').onclick = () => {
            if (!myNameInput.value) return alert('請輸入名字！');
            myName = myNameInput.value; isHost = true;
            joinOptions.classList.add('hidden'); roomWaiting.classList.remove('hidden');
            initPeer();
        };

        document.getElementById('btnJoinRoom').onclick = () => {
            if (!myNameInput.value) return alert('請輸入名字！');
            const roomId = document.getElementById('roomIdInput').value;
            if (!roomId) return alert('請輸入房號！');
            
            myName = myNameInput.value; joinOptions.classList.add('hidden'); roomWaiting.classList.remove('hidden');
            initPeer();
            setTimeout(() => {
                hostConnection = peer.connect(roomId);
                hostConnection.on('open', () => {
                    displayRoomId.textContent = roomId;
                    hostConnection.send({ type: 'join', id: myId, name: myName, color: myColor });
                });
                hostConnection.on('data', handleClientData);
            }, 1000);
        };

        btnStartGame.onclick = () => {
            if (isHost) {
                connections.forEach(c => c.send({ type: 'start_game' })); 
                startGame();
            }
        };

        function handleHostData(conn, data) {
            if (data.type === 'join') {
                players[data.id] = { name: data.name, x: 100, y: 0, rot: 0, color: data.color, finished: false, isMemeFrozen: false, memeText: "" };
                updatePlayerList();
                connections.forEach(c => c.send({ type: 'update_players', players: players }));
            }
            if (data.type === 'sync') {
                players[data.id].x = data.x; players[data.id].y = data.y; players[data.id].rot = data.rot;
                players[data.id].finished = data.finished;
                players[data.id].isMemeFrozen = data.isMemeFrozen; players[data.id].memeText = data.memeText;
                
                // 真人語音：如果對手剛發作，且本地還沒播過他的聲音
                if(data.isMemeFrozen && data.memeText !== "" && !players[data.id].hasSpoken) {
                    speakTTS(data.memeText);
                    players[data.id].hasSpoken = true;
                } else if (!data.isMemeFrozen) {
                    players[data.id].hasSpoken = false; // 重置
                }

                if(data.finished && !players[data.id].finishTime) players[data.id].finishTime = data.time;
            }
            if (data.type === 'restart') { restartGame(); }
        }

        function handleClientData(data) {
            if (data.type === 'update_players') { players = data.players; updatePlayerList(); }
            if (data.type === 'start_game') { startGame(); }
            if (data.type === 'restart') { restartGame(); }
            if (data.type === 'sync_all') {
                for (let id in data.players) {
                    if (id !== myId) {
                        const p = data.players[id];
                        players[id].x = p.x; players[id].y = p.y; players[id].rot = p.rot;
                        players[id].isMemeFrozen = p.isMemeFrozen; players[id].memeText = p.memeText;
                        
                        // 真人語音播放
                        if(p.isMemeFrozen && p.memeText !== "" && !players[id].hasSpoken) {
                            speakTTS(p.memeText);
                            players[id].hasSpoken = true;
                        } else if (!p.isMemeFrozen) {
                            players[id].hasSpoken = false;
                        }
                    }
                }
            }
        }

        function updatePlayerList() {
            playerList.innerHTML = '';
            for (let id in players) {
                const li = document.createElement('li');
                li.textContent = `> ${players[id].name}`; li.style.color = players[id].color;
                playerList.appendChild(li);
            }
        }

        function speakTTS(text) {
            if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'en-US'; utter.rate = 1.1; utter.pitch = 0.9 + Math.random()*0.2;
                window.speechSynthesis.speak(utter);
            }
        }

        function startGame() {
            uiContainer.classList.add('pointer-events-none', 'bg-transparent');
            lobbyScreen.classList.add('hidden'); document.getElementById('result-screen').classList.add('hidden');
            gameCanvas.classList.remove('hidden'); gameHud.classList.remove('hidden');
            resizeCanvas(); startTime = Date.now(); lastTime = 0;
            
            // 設定 1~3 次的迷因發作地雷區
            const triggerCount = Math.floor(Math.random() * 3) + 1;
            bike.memeTriggers = [];
            for(let i=0; i<triggerCount; i++) {
                bike.memeTriggers.push(2000 + Math.random() * (trackLength - 4000));
            }
            bike.memeTriggers.sort((a,b) => a-b);
            
            btnGas.addEventListener('touchstart', (e) => { e.preventDefault(); bike.isGasBtnDown = true; });
            btnGas.addEventListener('touchend', (e) => { e.preventDefault(); bike.isGasBtnDown = false; });
            btnGas.addEventListener('mousedown', () => bike.isGasBtnDown = true);
            window.addEventListener('mouseup', () => bike.isGasBtnDown = false);
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            bike = { x: 100, y: 0, vx: 0, vy: 0, angle: 0, isGasBtnDown: false, isAirborne: false, isCrashed: false, crashTimer: 0, finished: false, finishTime: 0, isMemeFrozen: false, memeTimer: 0, memeText: "", hasSpoken: false, memeTriggers: [] };
            for(let id in players) {
                players[id].finished = false; players[id].finishTime = 0; players[id].hasSpoken = false; players[id].isMemeFrozen = false;
                if(id === myId) { players[id].x = 100; players[id].y = 0; }
            }
            cancelAnimationFrame(gameLoopId); startGame();
        }

        btnRestart.onclick = () => {
            if(isHost) { connections.forEach(c => c.send({ type: 'restart' })); restartGame(); }
            else if(hostConnection) { hostConnection.send({ type: 'restart' }); }
        };

        function resizeCanvas() { gameCanvas.width = window.innerWidth; gameCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);

        function drawBike(x, y, angle, color, name, isMe, isCrashed, memeText, isFrozen) {
            ctx.save();
            ctx.translate(gameCanvas.width / 4 + (x - bike.x), gameCanvas.height / 2 + (y - bike.y));
            ctx.rotate(angle);

            // 畫名字 (往上移)
            ctx.fillStyle = color; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(name, 0, -90);

            // 迷因大字體對話框
            if (isFrozen && memeText) {
                ctx.save();
                ctx.rotate(-angle); // 文字保持水平
                ctx.font = 'bold 48px sans-serif'; 
                const textWidth = ctx.measureText(memeText).width;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(-textWidth/2 - 20, -170, textWidth + 40, 70);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.strokeRect(-textWidth/2 - 20, -170, textWidth + 40, 70);
                ctx.fillStyle = '#ff0000';
                ctx.fillText(memeText, 0, -120);
                ctx.restore();
            }

            if (isCrashed) {
                // 摔倒在地爬
                ctx.strokeStyle = color; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.stroke(); // 車倒了
                ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(-10, 0, 8, 0, Math.PI*2); ctx.fill(); 
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, -10, 6, 0, Math.PI*2); ctx.fill(); // 趴著的人
            } else {
                // 騎車姿勢
                ctx.strokeStyle = color; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-10, -25); ctx.lineTo(15, -25); ctx.lineTo(25, 0); ctx.lineTo(-10, -10); ctx.closePath(); ctx.stroke();
                ctx.fillStyle = '#333'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(-20, 0, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
                ctx.beginPath(); ctx.arc(25, 0, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(0, -45, 6, 0, Math.PI*2); ctx.fill(); 
                ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(-5, -25); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(15, -28); ctx.stroke(); 
            }
            ctx.restore();
        }

        function updatePhysics(dt) {
            if (bike.finished) return;

            // 迷因停格懲罰 (4.5秒 = 4.5 * 60fps 約 270 frames，這裡用時間較準確)
            if (bike.isMemeFrozen) {
                bike.memeTimer -= dt;
                bike.vx = 0; bike.vy = 0;
                if (bike.memeTimer <= 0) {
                    bike.isMemeFrozen = false; bike.memeText = "";
                }
                const trackInfo = getTrackData(bike.x);
                bike.y = trackInfo.y; bike.angle = trackInfo.angle;
                return;
            }

            // 觸發迷因檢查
            if (bike.memeTriggers.length > 0 && bike.x >= bike.memeTriggers[0]) {
                bike.memeTriggers.shift(); // 移除已觸發的
                bike.isMemeFrozen = true;
                bike.memeTimer = 4.5; // 4.5 秒
                bike.memeText = memeQuotes[Math.floor(Math.random() * memeQuotes.length)];
                speakTTS(bike.memeText);
                bike.vx = 0; bike.vy = 0;
                return;
            }

            if (bike.isCrashed) {
                bike.vx *= 0.9; bike.crashTimer -= dt;
                if (bike.crashTimer <= 0) { bike.isCrashed = false; bike.isAirborne = false; }
                const trackInfo = getTrackData(bike.x);
                bike.y = trackInfo.y; bike.angle = trackInfo.angle; 
            } else {
                const trackInfo = getTrackData(bike.x);
                if (bike.y < trackInfo.y - 2) {
                    bike.isAirborne = true;
                    bike.vy += 25 * dt; 
                    if (bike.isGasBtnDown) { bike.angle += 3.5 * dt; } 
                    else { bike.angle += 1.0 * dt; }
                    
                    bike.x += bike.vx * Math.cos(bike.angle) * dt * 60;
                    bike.y += bike.vy * dt * 60;

                    if (bike.y >= getTrackData(bike.x).y) {
                        bike.y = getTrackData(bike.x).y;
                        let trackNormAngle = getTrackData(bike.x).angle;
                        let normAngle = bike.angle % (Math.PI * 2);
                        if (normAngle < -Math.PI) normAngle += Math.PI * 2;
                        if (normAngle > Math.PI) normAngle -= Math.PI * 2;
                        
                        if (Math.abs(normAngle - trackNormAngle) > 0.6) {
                            bike.isCrashed = true; bike.crashTimer = 1.0; bike.vx = 0;
                        } else {
                            bike.isAirborne = false; bike.angle = trackNormAngle;
                            bike.vx = Math.sqrt(bike.vx*bike.vx + bike.vy*bike.vy); if (bike.vx > 21.6) bike.vx = 21.6;
                            bike.vy = 0;
                        }
                    }
                } else {
                    bike.isAirborne = false;
                    bike.y = trackInfo.y; bike.angle = trackInfo.angle;
                    
                    if (bike.isGasBtnDown) { bike.vx += 0.48 * dt * 60; } 
                    else { bike.vx *= Math.pow(0.96, dt * 60); }

                    const gravityImpact = Math.sin(trackInfo.angle) * 0.5 * dt * 60; 
                    bike.vx += gravityImpact;

                    if (bike.vx > 21.6) bike.vx = 21.6;
                    if (bike.vx < -2) bike.vx = -2; 

                    bike.x += bike.vx * Math.cos(trackInfo.angle) * dt * 60;
                    
                    let nextTrackY = getTrackData(bike.x + bike.vx * 2).y;
                    let currentSlope = Math.tan(trackInfo.angle);
                    let projectedY = bike.y + currentSlope * (bike.vx * 2);
                    
                    if (bike.vx > 8 && nextTrackY > projectedY + 10) {
                        bike.isAirborne = true;
                        bike.vy = bike.vx * Math.sin(trackInfo.angle);
                    }
                }
            }
        }

        function drawGame() {
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

            // 畫格線背景
            ctx.strokeStyle = '#f0f3fa'; ctx.lineWidth = 1;
            const offsetX = (bike.x * 0.4) % 100; const offsetY = (bike.y * 0.4) % 100;
            for(let i=0; i<gameCanvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i - offsetX, 0); ctx.lineTo(i - offsetX, gameCanvas.height); ctx.stroke(); }
            for(let i=0; i<gameCanvas.height; i+=100) { ctx.beginPath(); ctx.moveTo(0, i - offsetY); ctx.lineTo(gameCanvas.width, i - offsetY); ctx.stroke(); }

            ctx.save();
            ctx.translate(gameCanvas.width / 4, gameCanvas.height / 2); // 鎖定人物在畫面左側偏中
            
            // X 軸日期與 K 線圖
            for (let i = 0; i < dateLabels.length; i++) {
                const screenX = dateLabels[i].x - bike.x;
                if (screenX > -200 && screenX < gameCanvas.width) {
                    ctx.fillStyle = '#9ca3af'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(dateLabels[i].text, screenX, gameCanvas.height/2 - 40);
                    ctx.strokeStyle = '#e5e7eb'; ctx.beginPath(); ctx.moveTo(screenX, -gameCanvas.height); ctx.lineTo(screenX, gameCanvas.height); ctx.stroke();
                }
            }

            for (let i = 0; i < trackPoints.length - 1; i++) {
                const p1 = trackPoints[i]; const p2 = trackPoints[i+1];
                const screenX = p1.x - bike.x;
                if (screenX > -gameCanvas.width && screenX < gameCanvas.width) {
                    // 實體 K 線柱
                    const isUp = p2.y < p1.y;
                    ctx.fillStyle = isUp ? 'rgba(8, 153, 129, 0.4)' : 'rgba(242, 54, 69, 0.4)';
                    const heightOffset = Math.abs(p2.y - p1.y) + 40 + Math.random()*20;
                    ctx.fillRect(screenX, Math.min(p1.y, p2.y) - bike.y, (p2.x - p1.x)*0.8, heightOffset);
                    
                    // 均線賽道
                    ctx.beginPath(); ctx.lineWidth = 4; ctx.strokeStyle = '#2962ff';
                    ctx.moveTo(screenX, p1.y - bike.y); ctx.lineTo(p2.x - bike.x, p2.y - bike.y); ctx.stroke();
                }
            }

            // 終點紅旗
            const finishX = trackLength - bike.x;
            if (finishX < gameCanvas.width * 2) {
                ctx.fillStyle = '#000'; ctx.fillRect(finishX, getTrackData(trackLength).y - bike.y - 200, 5, 200);
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.moveTo(finishX+5, getTrackData(trackLength).y - bike.y - 200); 
                ctx.lineTo(finishX+80, getTrackData(trackLength).y - bike.y - 170); ctx.lineTo(finishX+5, getTrackData(trackLength).y - bike.y - 140); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign='left';
                ctx.fillText("FINISH", finishX + 10, getTrackData(trackLength).y - bike.y - 165);
            }

            ctx.restore(); 

            // 畫其他玩家
            for (let id in players) {
                if (id !== myId) {
                    const p = players[id];
                    drawBike(p.x, p.y, p.rot, p.color, p.name, false, p.isCrashed, p.memeText, p.isMemeFrozen);
                }
            }

            // 畫自己
            drawBike(bike.x, bike.y, bike.angle, myColor, myName, true, bike.isCrashed, bike.memeText, bike.isMemeFrozen);

            // 右側股價標籤 (使用者要求的原版樣式)
            const currentPrice = (3000 - bike.y) / 5; 
            ctx.fillStyle = currentPrice > 250 ? '#089981' : '#f23645';
            ctx.fillRect(gameCanvas.width - 100, gameCanvas.height/2 - 20, 100, 40);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center';
            ctx.fillText(`$${currentPrice.toFixed(2)}`, gameCanvas.width - 50, gameCanvas.height/2 + 5);
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            updatePhysics(dt);
            drawGame();
            syncNetwork();
            checkFinish();

            if (!bike.finished || isHost || document.getElementById('result-screen').classList.contains('hidden')) {
                gameLoopId = requestAnimationFrame(gameLoop);
            }
        }

        function syncNetwork() {
            if (Math.floor(Date.now() / 50) % 2 === 0) {
                const myState = {
                    type: 'sync', id: myId, x: bike.x, y: bike.y, rot: bike.angle, 
                    finished: bike.finished, time: bike.finishTime,
                    isMemeFrozen: bike.isMemeFrozen, memeText: bike.memeText
                };
                
                if (isHost) {
                    players[myId].x = bike.x; players[myId].y = bike.y; players[myId].rot = bike.angle;
                    players[myId].finished = bike.finished;
                    players[myId].isMemeFrozen = bike.isMemeFrozen; players[myId].memeText = bike.memeText;
                    if(bike.finished && !players[myId].finishTime) players[myId].finishTime = bike.finishTime;
                    connections.forEach(c => c.send({ type: 'sync_all', players: players }));
                } else {
                    if (hostConnection && hostConnection.open) hostConnection.send(myState);
                }
            }
        }

        function checkFinish() {
            if (!bike.finished && bike.x >= trackLength) {
                bike.finished = true; bike.finishTime = Date.now() - startTime;
                setTimeout(checkAllFinished, 1000);
            }
        }

        function checkAllFinished() {
            let allDone = true; let results = [];
            for (let id in players) {
                if (!players[id].finished) allDone = false;
                if (players[id].finished) results.push({ name: players[id].name, time: players[id].finishTime });
            }

            if (allDone && results.length > 0) {
                showLeaderboard(results);
            } else if (bike.finished) {
                setTimeout(checkAllFinished, 1000);
            }
        }

        function showLeaderboard(results) {
            cancelAnimationFrame(gameLoopId);
            gameHud.classList.add('hidden');
            uiContainer.classList.remove('pointer-events-none', 'bg-transparent');
            document.getElementById('result-screen').classList.remove('hidden');
            if(isHost) btnRestart.classList.remove('hidden');

            results.sort((a, b) => a.time - b.time);
            const board = document.getElementById('leaderboard');
            board.innerHTML = '';
            
            results.forEach((r, index) => {
                const isLoser = index === results.length - 1;
                const timeStr = (r.time / 1000).toFixed(2) + ' 秒';
                const el = document.createElement('div');
                el.className = `flex justify-between p-3 rounded border ${isLoser ? 'bg-red-100 border-red-300' : 'bg-white border-gray-200'}`;
                el.innerHTML = `<span class="font-bold text-gray-800">${index + 1}. ${r.name}</span> <span class="text-gray-500 font-mono">${timeStr}</span>`;
                board.appendChild(el);
                if (isLoser) document.getElementById('loserName').textContent = r.name;
            });
        }
    </script>
