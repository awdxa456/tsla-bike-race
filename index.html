<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Bicycle Race Beta v0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-layer { position: absolute; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .hidden { display: none !important; }
        
        input, select { background-color: #f0f3fa; border: 1px solid #d1d4dc; color: #131722; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: #2962ff; }
        
        .control-btn {
            background: #ffffff; border: 2px solid #2962ff; color: #2962ff;
            border-radius: 50%; width: 82px; height: 82px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 900; box-shadow: 0 4px 15px rgba(41, 98, 255, 0.2); transition: all 0.05s ease;
        }
        .control-btn:active { background: #2962ff; color: #ffffff; transform: scale(0.9); }

        @media (max-width: 640px) {
            .control-btn { width: 68px; height: 68px; font-size: 21px; box-shadow: 0 3px 10px rgba(41, 98, 255, 0.22); }
            #game-hud > div:first-child { margin-top: 54px; margin-left: 10px; margin-right: 10px; }
            #game-hud > div:last-child { padding: 0 14px 18px 14px; }
        }

        .tv-toolbar { background-color: #ffffff; border-color: #e0e3eb; }
        .tv-icon { width: 24px; height: 24px; fill: #787b86; cursor: pointer; transition: fill 0.2s; }
        .tv-icon:hover { fill: #131722; }
    </style>
</head>
<body>

    <!-- TradingView 上方工具列 -->
    <div class="ui-layer interactive w-full h-[50px] tv-toolbar border-b flex items-center px-4 justify-between z-20">
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 cursor-pointer">
                <div class="w-7 h-7 bg-[#e21c31] rounded-full flex items-center justify-center text-white font-bold text-[16px] leading-none pb-[2px]">T</div>
                <span class="font-black text-lg text-[#131722] tracking-wide" id="tv-ticker">TSLA</span>
            </div>
            <div class="h-6 w-px bg-[#e0e3eb]"></div>
            <div class="flex space-x-3 text-[#787b86] font-semibold text-sm">
                <span class="hover:text-[#131722] cursor-pointer">1D</span>
                <span class="hover:text-[#131722] cursor-pointer">5D</span>
                <span class="hover:text-[#131722] cursor-pointer">1M</span>
            </div>
            <div class="h-6 w-px bg-[#e0e3eb] hidden md:block"></div>
            <div class="hidden md:flex space-x-3">
                <svg class="tv-icon" viewBox="0 0 28 28"><path d="M12 14.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-2.5-1.5a2.5 2.5 0 1 1 5 0 2.5 2.5 0 0 1-5 0zM15 8h4v1h-4V8zm0 11h4v1h-4v-1zm-6-5h4v1H9v-1z" fill-rule="evenodd"/></svg>
                <span class="text-sm font-semibold text-[#787b86] hover:text-[#131722] cursor-pointer pt-0.5">技術指標</span>
                <svg class="tv-icon" viewBox="0 0 28 28"><path d="M11 9h6v1h-6V9zm0 4h6v1h-6v-1zm0 4h6v1h-6v-1zM8 7h12v14H8V7zm1 1v12h10V8H9z" fill-rule="evenodd"/></svg>
            </div>
        </div>
        <div class="hidden sm:flex items-center space-x-4 text-sm font-mono text-[#787b86]">
            <span>O:<span id="tv-o" class="text-[#131722]">0.00</span></span>
            <span>H:<span id="tv-h" class="text-[#131722]">0.00</span></span>
            <span>L:<span id="tv-l" class="text-[#131722]">0.00</span></span>
            <span>C:<span id="tv-c" class="text-[#131722]">0.00</span></span>
        </div>
    </div>

    <!-- TradingView 左側繪圖工具列 -->
    <div class="ui-layer interactive w-[50px] h-full pt-[50px] tv-toolbar border-r flex flex-col items-center py-4 space-y-5 z-10 hidden sm:flex">
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M14 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-1 6a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm1 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M7 14.5A1.5 1.5 0 1 1 7 11.5a1.5 1.5 0 0 1 0 3zm14 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM8.33 12h11.34v1H8.33v-1z"/></svg>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M10 8h2v1h-2V8zm0 4h6v1h-6v-1zm0 4h8v1h-8v-1z"/></svg>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M18.83 8.17l.7.7-8.48 8.49-.7-.7 8.48-8.49zM10.5 15.5l2 2-3 1 1-3z"/></svg>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M11 11h6v1h-6v-1zm0 3h6v1h-6v-1zm-2-6h10v10H9V8zm1 1v8h8V9h-8z"/></svg>
        <div class="w-6 border-b border-[#e0e3eb] my-2"></div>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M13 14a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-1a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
        <svg class="tv-icon" viewBox="0 0 28 28"><path d="M9 10h10v1H9v-1zm0 4h10v1H9v-1z"/></svg>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- UI 大廳與互動層 -->
    <div id="ui-container" class="ui-layer interactive w-full h-full flex flex-col items-center justify-center p-4 z-30 bg-[#ffffff] bg-opacity-95">
        
        <div id="custom-alert" class="hidden fixed top-[70px] bg-[#f23645] text-white px-6 py-3 rounded shadow-lg z-50 font-bold tracking-wide">
            ⚠️ <span id="alert-text">提示</span>
        </div>

        <div id="lobby-screen" class="bg-white p-8 rounded-xl shadow-[0_10px_30px_rgba(19,23,34,0.1)] border border-[#e0e3eb] max-w-md w-full text-center">
            <h1 class="text-3xl font-black mb-1 text-[#131722] tracking-tight">Stock Bicycle Race Beta v0.2</h1>
            <p class="text-[#787b86] mb-8 text-sm font-semibold">控制速度，別在崩盤時跌倒！</p>
            
            <input type="text" id="playerName" placeholder="輸入你的 ID" class="w-full p-3 mb-6 rounded text-center text-lg font-bold" maxlength="10">
            
            <div id="join-options" class="flex flex-col gap-4">
                <div class="bg-[#f8f9fd] p-4 rounded border border-[#e0e3eb]">
                    <h3 class="text-sm text-[#131722] mb-3 font-bold text-left">建立派對 (莊家)</h3>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="customRoomId" placeholder="自訂好記房號" class="w-full p-2 rounded text-center text-sm font-mono font-bold">
                    </div>
                    <button id="btnCreateRoom" class="w-full py-2.5 bg-[#2962ff] hover:bg-[#1e4bd8] rounded font-bold text-white transition shadow-md">建立賽道</button>
                </div>
                
                <div class="flex items-center gap-2"><hr class="flex-grow border-[#e0e3eb]"><span class="text-[#b2b5be] text-xs font-bold">OR</span><hr class="flex-grow border-[#e0e3eb]"></div>
                
                <div class="flex gap-2">
                    <input type="text" id="roomIdInput" placeholder="輸入朋友房號" class="w-2/3 p-3 rounded text-center font-mono font-bold">
                    <button id="btnJoinRoom" class="w-1/3 bg-[#089981] hover:bg-[#067a67] rounded text-white font-bold transition shadow-md">加入</button>
                </div>
            </div>

            <div id="room-waiting" class="hidden flex-col items-center mt-2">
                <div class="flex justify-between items-center w-full bg-[#f8f9fd] p-3 rounded border border-[#e0e3eb] mb-4">
                    <div class="text-left">
                        <p class="text-xs text-[#787b86] font-bold">目前房號</p>
                        <h2 id="displayRoomId" class="text-xl text-[#2962ff] font-black tracking-widest select-all">---</h2>
                    </div>
                    <button id="btnCopyLink" class="bg-[#e0e3eb] hover:bg-[#d1d4dc] text-[#131722] text-xs font-bold px-3 py-2 rounded transition shadow-sm">🔗 複製連結</button>
                </div>
                
                <div class="w-full bg-white rounded p-4 mb-4 min-h-[120px] text-left border border-[#e0e3eb] shadow-inner">
                    <h3 class="text-[#131722] text-sm mb-2 font-bold border-b border-[#e0e3eb] pb-2">已就位車手：</h3>
                    <ul id="playerList" class="space-y-1 font-mono font-bold text-[#131722] mt-2"></ul>
                </div>
                <button id="btnStartGame" class="w-full py-3 bg-[#f23645] hover:bg-[#d92c3a] rounded font-black text-white text-xl transition shadow-lg hidden">🚀 發車！</button>
                <p id="waitingText" class="text-[#787b86] animate-pulse text-sm font-bold mt-2">等待莊家發車...</p>
            </div>
        </div>

        <div id="game-hud" class="hidden w-full h-full flex-col justify-between pointer-events-none absolute top-0 left-0">
            <div class="mt-[60px] ml-[60px] mr-4 flex justify-between items-start pointer-events-auto">
                <div class="bg-white p-2 px-3 rounded text-sm font-mono border border-[#e0e3eb] shadow-md">
                    <div class="text-[#787b86] font-bold">賽道完成度</div>
                    <div id="hud-dist" class="text-[#2962ff] font-black text-lg">0%</div>
                </div>

                <div id="crash-warning" class="hidden bg-[#f23645] text-white px-5 py-2 rounded-full font-black animate-bounce shadow-lg">
                    💥 跌倒！(爬起中...)
                </div>
            </div>
            
            <div class="flex justify-between items-end pb-8 px-8 pointer-events-auto w-full">
                <div></div>
                <div><button id="btnGas" class="control-btn">GO</button></div>
            </div>
        </div>

        <div id="result-screen" class="hidden bg-white p-8 rounded-xl shadow-[0_10px_30px_rgba(19,23,34,0.15)] border border-[#e0e3eb] max-w-md w-full text-center">
            <h1 class="text-3xl font-black mb-6 text-[#131722] tracking-tight">收盤結算</h1>
            <div id="leaderboard" class="w-full bg-[#f8f9fd] rounded p-4 mb-6 text-left space-y-2 border border-[#e0e3eb]"></div>
            <div id="loser-pays" class="bg-[#fff0f0] border-2 border-[#f23645] p-5 rounded-lg mb-6 shadow-sm">
                <h2 class="text-xl font-bold text-[#f23645]">🚨 還不去結帳 🚨</h2>
                <p id="loserName" class="text-3xl font-black text-[#131722] mt-2">某某某</p>
                <p class="text-sm text-[#f23645] mt-1 font-bold tracking-wider">Go pay the bill, loser!</p>
            </div>
            <div class="flex gap-3">
                <button id="btnRematch" class="w-full py-3 bg-[#2962ff] hover:bg-[#1e4bd8] text-white rounded font-bold transition shadow-md hidden">🔄 再戰一局</button>
                <button id="btnWaitRematch" class="w-full py-3 bg-[#f0f3fa] text-[#787b86] rounded font-bold cursor-not-allowed hidden">等待莊家重開...</button>
            </div>
        </div>
    </div>

    <script>
        const UI = {
            nameInput: document.getElementById('playerName'), roomIdInput: document.getElementById('roomIdInput'),
            customRoomId: document.getElementById('customRoomId'), container: document.getElementById('ui-container'),
            lobby: document.getElementById('lobby-screen'), joinOptions: document.getElementById('join-options'),
            waiting: document.getElementById('room-waiting'), displayId: document.getElementById('displayRoomId'),
            playerList: document.getElementById('playerList'), btnStart: document.getElementById('btnStartGame'),
            btnCopyLink: document.getElementById('btnCopyLink'), waitingText: document.getElementById('waitingText'),
            canvas: document.getElementById('gameCanvas'), hud: document.getElementById('game-hud'),
            btnGas: document.getElementById('btnGas'), result: document.getElementById('result-screen'),
            board: document.getElementById('leaderboard'), loserName: document.getElementById('loserName'),
            btnRematch: document.getElementById('btnRematch'), btnWaitRematch: document.getElementById('btnWaitRematch'),
            tvO: document.getElementById('tv-o'), tvH: document.getElementById('tv-h'), tvL: document.getElementById('tv-l'), tvC: document.getElementById('tv-c')
        };
        const ctx = UI.canvas.getContext('2d');

        function showWarning(msg) {
            const box = document.getElementById('custom-alert'); document.getElementById('alert-text').textContent = msg;
            box.classList.remove('hidden'); setTimeout(() => box.classList.add('hidden'), 3000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('room')) { UI.roomIdInput.value = urlParams.get('room'); }

        let myName = localStorage.getItem('playerName') || "";
        UI.nameInput.value = myName;
        
        let peer = null, isHost = false, myId = null;
        let connections = [], hostConnection = null, players = {};
        let gameLoopId = null, lastTime = 0;
        
        const myColor = ["#2962ff", "#f23645", "#089981", "#ff9800", "#9c27b0", "#e91e63"][Math.floor(Math.random()*6)];
        
        // 中文迷因金句資料庫

            "這不是下跌，這是打折。", "拜託讓我解套就好。", "我剛買就崩給我看？", "主力是不是在看我帳戶？",

            "我已經跟股票結婚了。", "別問，問就是攤平。", "加碼一時爽，套牢火葬場。", "我需要財富自由，不是財富失蹤。",

            // 特斯拉與馬斯克梗

            "這餐可以用狗狗幣付嗎？", "特斯拉救救我的帳戶！", "我買在 420，不要問。", "機器人先救我的股票。",
            "Robotaxi 又延後了嗎？", "星鏈斷線，我也斷頭。", "今天不是電動車，是電動跌。", "Elon，拜託先不要推文。",

            // 台灣投資人日常

            // 技術分析吐槽
            "支撐破了，信仰也破了。", "壓力太大，我也是。", "RSI 超賣了，我也超累。", "MACD 翻黑，人生也翻黑。",
            "黃金交叉呢？怎麼變死亡交叉？", "這是洗盤，對吧？", "這不是破線，是主力測試我。", "均線都救不了我。",
            "K 線畫得很漂亮，帳戶很難看。", "這根影線是在嘲笑我。", "量縮整理，整理我的人生。", "突破是假，套牢是真。",

            // 迷因與絕望

            "哪次不 V？", "大爆 V！", "怎麼 A 了啦？", "有 A 味。",
            "空軍召集令！", "多蛙會所嫩模。", "空蛙文明即將毀滅。", "空頭不死，多頭不止。",
            "這裡就是逃命反彈。", "噴！崩！快逃！", "早安大爆崩。", "這次真的完蛋了。",
            "丸子，股市藥丸。", "蒸的丸子。", "塊陶啊！", "媽媽！救命啊！",
            "這次不一樣。", "這次不能再錯過了。", "過了這個村，還有下一個山頂。", "追高仔在山頂學狗叫。",
            "單呢？沒單下去。", "相信哲哲，財富對折。", "相信鴻海，別墅靠海。", "相信黃董，懂的抖動。",
            "存股台積電，不如存股紅茶店？", "護國神山，救救韭菜。", "買入紅茶店，躺入停屍間。", "99 公公！",

            "果然。", "糕。", "送分題送到我畢業。", "不急，因為已經跌停。",
            "沒殺意，只是殺我。", "你會贏喔。", "問就是買買買。", "股版壞人多。",
            "少年股神，今日畢業。", "收回辭職單。", "勇敢的台灣人，勇敢地套住。", "清明前不賣股，清明後等撿骨。"
        ];

            osc.frequency.exponentialRampToValueAtTime(type === 'crash' ? 240 : 420, now + duration);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(type === 'crash' ? 0.18 : 0.11, now + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        function generateMap() {
            candlesticks = []; maPoints = []; volumes = [];
            const pointsCount = 180;
            const stepX = trackLength / pointsCount;

            // 每局比賽從真實 TSLA 歷史股價中，隨機抽一段連續日 K 當賽道
            if (tslaHistory.length >= pointsCount + 1) {
                const startIndex = Math.floor(Math.random() * (tslaHistory.length - pointsCount - 1));
                const segment = tslaHistory.slice(startIndex, startIndex + pointsCount + 1);
                const maxVolume = Math.max(...segment.map(d => d.v || 1));

                segment.forEach((d, i) => {
                    candlesticks.push({
                        x: i * stepX,
                        open: d.o,
                        close: d.c,
                        high: d.h,
                        low: d.l,
                        date: d.d
                    });
                    // 保留真實成交量相對大小，但縮放成畫面適合的高度
                    volumes.push(Math.max(20, (d.v / maxVolume) * 260));
                });
            } else {
                // 保險 fallback：如果資料不完整，才使用舊的模擬價格
                let currentPrice = 300;
                let currentDate = new Date('2024-01-01');
                for (let i = 0; i <= pointsCount; i++) {
                    let open = currentPrice;
                    let change = (Math.random() - 0.5) * 45;
                    if (i === 30) change = -200;
                    if (i === 70) change = 180;
                    if (i === 120) change = -150;
                    let close = open + change;
                    let high = Math.max(open, close) + Math.random() * 25;
                    let low = Math.min(open, close) - Math.random() * 25;
                    let vol = Math.random() * 100 + (Math.abs(change) > 100 ? 200 : 0);
                    let dateStr = currentDate.toISOString().split('T')[0];
                    candlesticks.push({ x: i * stepX, open, close, high, low, date: dateStr });
                    volumes.push(vol);
                    currentPrice = close;
                    currentDate.setDate(currentDate.getDate() + 1 + Math.floor(Math.random() * 2));
                }
            }

            for (let i = 0; i < candlesticks.length; i++) {
                let sum = 0, count = 0;
                for (let j = Math.max(0, i - 4); j <= i; j++) { sum += candlesticks[j].close; count++; }
                let ma = sum / count;
                maPoints.push({ x: candlesticks[i].x, y: 700 - ma });
            }
        }

        function getTrackData(x) {
            if (x <= 0) return { y: maPoints[0].y, angle: 0 };
            if (x >= trackLength) return { y: maPoints[maPoints.length-1].y, angle: 0 };
            for (let i = 0; i < maPoints.length - 1; i++) {
                if (x >= maPoints[i].x && x < maPoints[i+1].x) {
                    const p1 = maPoints[i], p2 = maPoints[i+1];
                    const t = (x - p1.x) / (p2.x - p1.x);
                    return { y: p1.y + t * (p2.y - p1.y), angle: Math.atan2(p2.y - p1.y, p2.x - p1.x) };
                }
            }
            return { y: 0, angle: 0 };
        }

                if (bike.crashTimer <= 0) {
                    bike.isCrashed = false;
                    document.getElementById('crash-warning').classList.add('hidden');
                }
            } else {
                bike.vy += 0.5 * dtMultiplier; // 重力
                let trackInfo = getTrackData(bike.x);

                if (!bike.isAirborne && bike.isGasBtnDown) {
                    let accel = 0.385 * dtMultiplier;
                    bike.vx += accel * Math.cos(trackInfo.angle);
                    bike.vy += accel * Math.sin(trackInfo.angle);
                }

                bike.x += bike.vx * dtMultiplier;
                bike.y += bike.vy * dtMultiplier;

                let newTrackInfo = getTrackData(bike.x);
                if (bike.y >= newTrackInfo.y) {
                    if (bike.isAirborne) {
                        let nAngle = Math.atan2(Math.sin(bike.angle), Math.cos(bike.angle));
                        let nTrackAngle = Math.atan2(Math.sin(newTrackInfo.angle), Math.cos(newTrackInfo.angle));
                        let diff = Math.abs(nAngle - nTrackAngle);
                        if (diff > Math.PI) diff = 2 * Math.PI - diff; 
                        
                        // 跌倒判定 (大於 35度)
                        if (diff > 0.6) {
                            bike.isCrashed = true;
                            bike.crashTimer = 1.0; 
                            bike.vx *= 0.1; bike.vy = 0;
                            playScream('crash');
                            document.getElementById('crash-warning').classList.remove('hidden');
                        }
                    }

                    if (!bike.isCrashed) {
                        bike.isAirborne = false;
                        bike.y = newTrackInfo.y;
                        bike.angle = newTrackInfo.angle; 

                        let speedAlongTrack = bike.vx * Math.cos(newTrackInfo.angle) + bike.vy * Math.sin(newTrackInfo.angle);
                        speedAlongTrack *= Math.pow(0.99, dtMultiplier); 
                        if (!bike.isGasBtnDown) speedAlongTrack *= Math.pow(0.95, dtMultiplier); 

                        // 最高速限放慢 30%，讓日期與 K 線推進更有感
                        if (speedAlongTrack > 12.6) speedAlongTrack = 12.6;
                        if (speedAlongTrack < -3) speedAlongTrack = -3;

                        bike.vx = speedAlongTrack * Math.cos(newTrackInfo.angle);
                        bike.vy = speedAlongTrack * Math.sin(newTrackInfo.angle);
                    }
                } else {
                    if (!bike.isAirborne) bike.spinSpeed = bike.vx * 0.005; 
                    bike.isAirborne = true;
                    // 在空中死按著油門會瘋狂前空翻
                    if (bike.isGasBtnDown) bike.spinSpeed += 0.003 * dtMultiplier;
                    bike.angle += bike.spinSpeed * dtMultiplier;
                }
            }

            const progress = Math.min(100, Math.floor((bike.x / trackLength) * 100));
            document.getElementById('hud-dist').textContent = `${progress}%`;
            
            let currentCandle = candlesticks.find(c => c.x >= bike.x);
            if(currentCandle && Math.floor(Date.now() / 200) % 2 === 0) {
                UI.tvO.textContent = currentCandle.open.toFixed(2); UI.tvH.textContent = currentCandle.high.toFixed(2);
                UI.tvL.textContent = currentCandle.low.toFixed(2);
                UI.tvC.textContent = (currentCandle.close + (Math.random()-0.5)*2).toFixed(2);
                UI.tvC.className = currentCandle.close >= currentCandle.open ? 'text-[#089981]' : 'text-[#f23645]';
            }
        }

        function drawTradingViewChart() {
            // 平滑更新世界相機 (鎖定玩家為中心稍微偏左)
            const isPhone = UI.canvas.width <= 640;
            let targetCamX = bike.x - (UI.canvas.width * (isPhone ? 0.34 : 0.3)) / cameraZoom;
            let targetCamY = bike.y - (UI.canvas.height * (isPhone ? 0.56 : 0.45)) / cameraZoom;
            // 手機起跑時保留左側安全邊界，避免角色與名字被裁切
            const minCamX = isPhone ? -150 : -80;
            if (targetCamX < minCamX) targetCamX = minCamX; 

            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, UI.canvas.width, UI.canvas.height);
            
            ctx.save();
            ctx.scale(cameraZoom, cameraZoom);
            ctx.translate(-camera.x, -camera.y); // 將畫布移動到世界相機位置

            // 1. 繪製絕對靜止的背景網格 (根據相機視角)
            ctx.strokeStyle = '#f0f3fa'; ctx.lineWidth = 1 / cameraZoom;
            const left = camera.x, right = camera.x + UI.canvas.width / cameraZoom;
            const top = camera.y, bottom = camera.y + UI.canvas.height / cameraZoom;
            
            for(let i = Math.floor(left/150)*150; i < right; i+=150) { ctx.beginPath(); ctx.moveTo(i, top); ctx.lineTo(i, bottom); ctx.stroke(); }
            for(let j = Math.floor(top/80)*80; j < bottom; j+=80) { ctx.beginPath(); ctx.moveTo(left, j); ctx.lineTo(right, j); ctx.stroke(); }
            
            // 2. 浮水印
            ctx.fillStyle = 'rgba(240, 243, 250, 0.8)';
            ctx.font = `bold ${UI.canvas.width <= 640 ? 150 : 200}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("TSLA", left + (right - left)/2, top + (bottom - top)/2);

            // 3. 繪製底部成交量與 K 線
            const isPhoneChart = UI.canvas.width <= 640;
            const candleBodyW = isPhoneChart ? 46 : 32;
            const candleWickW = isPhoneChart ? 5.5 : 3.5;
            const volumeW = isPhoneChart ? 24 : 16;
            candlesticks.forEach((c, idx) => {
                if (c.x > left - 100 && c.x < right + 100) {
                    const isUp = c.close >= c.open;
                    const color = isUp ? '#089981' : '#f23645'; 
                    const vHeight = volumes[idx] * 0.5;
                    ctx.fillStyle = isUp ? 'rgba(8, 153, 129, 0.45)' : 'rgba(242, 54, 69, 0.45)';
                    ctx.fillRect(c.x - volumeW / 2, 1100 - vHeight, volumeW, vHeight); // 量
                    
                    ctx.strokeStyle = color; ctx.lineWidth = candleWickW;
                    ctx.beginPath(); ctx.moveTo(c.x, 700 - c.high); ctx.lineTo(c.x, 700 - c.low); ctx.stroke(); // 影線
                    
                    ctx.fillStyle = color;
                    let bodyTop = 700 - Math.max(c.open, c.close);
                    let bodyHeight = Math.max(isPhoneChart ? 7 : 5, Math.abs(c.close - c.open));
                    ctx.fillRect(c.x - candleBodyW / 2, bodyTop, candleBodyW, bodyHeight); // 實體
                }
            });

            // 4. 繪製 5 日均線賽道：先畫深色底軌，再畫藍色主軌，讓車手看起來真的騎在線上
            const drawTrackLine = () => {
                ctx.beginPath(); ctx.lineJoin = "round"; ctx.lineCap = "round";
                for (let i = 0; i < maPoints.length - 1; i++) {
                    if (maPoints[i].x > left - 200 && maPoints[i].x < right + 200) {
                        if(i === 0 || maPoints[i-1].x <= left - 200) ctx.moveTo(maPoints[i].x, maPoints[i].y);
                        ctx.lineTo(maPoints[i+1].x, maPoints[i+1].y);
                    }
                }
            };
            drawTrackLine(); ctx.lineWidth = isPhoneChart ? 20 : 16; ctx.strokeStyle = 'rgba(19, 23, 34, 0.20)'; ctx.stroke();
            drawTrackLine(); ctx.lineWidth = isPhoneChart ? 12 : 10; ctx.strokeStyle = '#2962ff'; ctx.shadowColor = 'rgba(41, 98, 255, 0.45)'; ctx.shadowBlur = 18; ctx.stroke(); ctx.shadowBlur = 0;
            
            // 5. 畫終點紅旗
            if (trackLength > left && trackLength < right + 500) {
                const finishY = maPoints[maPoints.length-1].y;
                ctx.fillStyle = '#787b86'; ctx.fillRect(trackLength, finishY - 200, 6, 200); // 旗桿
                ctx.fillStyle = '#f23645'; 
                ctx.beginPath(); ctx.moveTo(trackLength + 6, finishY - 190); ctx.lineTo(trackLength + 80, finishY - 160); ctx.lineTo(trackLength + 6, finishY - 130); ctx.fill(); // 紅旗
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'left'; ctx.fillText('FINISH', trackLength + 12, finishY - 155);
            }
            ctx.restore();

            // 6. UI 層: 底部日期 X 軸
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, UI.canvas.height - 30, UI.canvas.width, 30);
            ctx.strokeStyle = '#e0e3eb'; ctx.beginPath(); ctx.moveTo(0, UI.canvas.height - 30); ctx.lineTo(UI.canvas.width, UI.canvas.height - 30); ctx.stroke();
            
            ctx.fillStyle = '#787b86'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            let lastMonth = ""; 
            candlesticks.forEach(c => {
                const screenX = (c.x - camera.x) * cameraZoom;
                if (screenX > 0 && screenX < UI.canvas.width) {
                    const monthKey = c.date.substring(0, 7); // YYYY-MM
                    if (monthKey !== lastMonth) {
                        ctx.beginPath(); ctx.moveTo(screenX, UI.canvas.height - 30); ctx.lineTo(screenX, UI.canvas.height - 25); ctx.stroke();
                        ctx.fillText(monthKey.replace('-', '年') + '月', screenX, UI.canvas.height - 15);
                        lastMonth = monthKey;
                    }
                }
            });

            // 7. UI 層: 右側價格 Y 軸
            const priceAxisW = UI.canvas.width <= 640 ? 46 : 60;
            ctx.fillStyle = '#ffffff'; ctx.fillRect(UI.canvas.width - priceAxisW, 50, priceAxisW, UI.canvas.height - 80);
            ctx.strokeStyle = '#e0e3eb'; ctx.beginPath(); ctx.moveTo(UI.canvas.width - priceAxisW, 50); ctx.lineTo(UI.canvas.width - priceAxisW, UI.canvas.height - 30); ctx.stroke();
            ctx.fillStyle = '#131722'; ctx.font = `${UI.canvas.width <= 640 ? 10 : 11}px Arial`; ctx.textAlign = 'right';
            for(let j=0; j<UI.canvas.height; j+=80) {
                let simPrice = (700 - (camera.y + (j - 50) / cameraZoom)).toFixed(1);
                ctx.fillText(simPrice, UI.canvas.width - 8, j + 4 + 50);
            }
        }

        function drawSpeechBubble(screenX, screenY, memeTxt, color = '#f23645') {
            const isPhone = UI.canvas.width <= 640;
            const isLandscape = UI.canvas.width > UI.canvas.height;
            const bubbleW = Math.min(isLandscape ? 380 : 360, UI.canvas.width - 24);
            const bubbleH = isPhone ? 58 : 70;
            const halfW = bubbleW / 2;
            const x = Math.max(12 + halfW, Math.min(UI.canvas.width - 12 - halfW, screenX));
            // 泡泡離角色再遠一點，避免迷因句跟玩家名字重疊；上方不夠才改到下方
            const preferAboveY = screenY - (isLandscape ? 118 : 150);
            const y = preferAboveY < 72 ? Math.min(UI.canvas.height - 82, screenY + 118) : preferAboveY;
            ctx.save();
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#131722'; ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(19, 23, 34, 0.18)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 4;
            ctx.beginPath(); ctx.roundRect(x - halfW, y - bubbleH / 2, bubbleW, bubbleH, 14); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
            const tailX = Math.max(x - halfW + 28, Math.min(x + halfW - 28, screenX));
            const tailDir = y < screenY ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(tailX - 13, y + tailDir * bubbleH / 2);
            ctx.lineTo(screenX, y + tailDir * (bubbleH / 2 + 22));
            ctx.lineTo(tailX + 13, y + tailDir * bubbleH / 2);
            ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle = color; ctx.font = `bold ${isPhone ? 24 : 32}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(memeTxt, x, y, bubbleW - 24);
            ctx.restore();
        }

        function drawBicycle(x, y, angle, color, name, isCrashed, isFrozen, memeTxt) {
            const pos = screenPos(x, y);
            if (isFrozen && memeTxt) drawSpeechBubble(pos.x, pos.y, memeTxt, color);

            ctx.save();
            ctx.scale(cameraZoom, cameraZoom);
            ctx.translate((x - camera.x), (y - camera.y)); // 依據世界相機定位
            
            ctx.rotate(angle);
            ctx.translate(0, -8); // 讓輪胎壓在線圖賽道上，而不是整個角色蓋住線
            ctx.scale(riderScale, riderScale);

            // 名字 ID：改放在車手下方，避免跟上方迷因句重疊
            ctx.fillStyle = color; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(name, 0, 34);

            // 車身
            ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.arc(-22, -10, 10, 0, Math.PI*2); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(22, -10, 10, 0, Math.PI*2); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(-22, -10); ctx.lineTo(-6, -30); ctx.lineTo(12, -30); ctx.lineTo(22, -10); 
            ctx.moveTo(12, -30); ctx.lineTo(0, -10); ctx.lineTo(-22, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-10, -30); ctx.lineTo(-2, -30); ctx.lineWidth = 6; ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(12, -30); ctx.lineTo(10, -40); ctx.lineTo(16, -40); ctx.lineWidth = 5; ctx.stroke(); 

            // 火柴人
            ctx.strokeStyle = '#131722'; ctx.fillStyle = '#131722'; ctx.lineWidth = 5;
            if (isCrashed) { ctx.translate(10, -15); ctx.rotate(Math.PI / 2); }
            ctx.beginPath(); ctx.arc(0, -55, 7, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, -48); ctx.lineTo(-4, -30); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -42); ctx.lineTo(12, -40); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-4, -30); ctx.lineTo(0, -20); ctx.lineTo(0, -10); ctx.stroke();

            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1; 
            
            updatePhysics(dt);
            drawTradingViewChart();
            for (let id in players) {
                if (id !== myId) {
                    const p = players[id];
                    drawBicycle(p.x, p.y, p.rot, p.color, p.name, p.crashed, p.memeFrozen, p.memeTxt);
                }
            }
            drawBicycle(bike.x, bike.y, bike.angle, myColor, myName, bike.isCrashed, bike.isMemeFrozen, bike.memeText);
            for (let id in players) { if (id !== myId) drawRiderIndicator(players[id]); }

            syncNetwork(); checkFinish();
            if (!bike.finished || isHost) gameLoopId = requestAnimationFrame(gameLoop);
        }

        function syncNetwork() {
            if (Math.floor(Date.now() / 50) % 2 === 0) {
                const myState = { type: 'sync', id: myId, x: bike.x, y: bike.y, rot: bike.angle, crashed: bike.isCrashed, finished: bike.finished, time: bike.finishTime, memeFrozen: bike.isMemeFrozen, memeTxt: bike.memeText };
                if (isHost) {
                    players[myId].x = bike.x; players[myId].y = bike.y; players[myId].rot = bike.angle; 
                    players[myId].crashed = bike.isCrashed; players[myId].finished = bike.finished;
                    players[myId].memeFrozen = bike.isMemeFrozen; players[myId].memeTxt = bike.memeText;
                    if(bike.finished && !players[myId].finishTime) players[myId].finishTime = bike.finishTime;
                    connections.forEach(c => c.send({ type: 'sync_all', players: players }));
                } else {
                    if (hostConnection && hostConnection.open) hostConnection.send(myState);
                }
            }
        }

        function checkFinish() {
            if (!bike.finished && bike.x >= trackLength) {
                bike.finished = true; bike.finishTime = Date.now() - startTime;
                setTimeout(checkAllFinished, 1000);
            }
        }

        function checkAllFinished() {
            let allDone = true, results = [];
            for (let id in players) {
                if (!players[id].finished) allDone = false;
                else results.push({ name: players[id].name, time: players[id].finishTime });
            }

            if (allDone && results.length > 0) {
                cancelAnimationFrame(gameLoopId);
                UI.hud.classList.add('hidden'); UI.container.classList.remove('pointer-events-none', 'bg-transparent'); UI.container.classList.add('bg-[#ffffff]', 'bg-opacity-90'); UI.result.classList.remove('hidden');
                if (isHost) { UI.btnRematch.classList.remove('hidden'); UI.btnWaitRematch.classList.add('hidden'); } 
                else { UI.btnRematch.classList.add('hidden'); UI.btnWaitRematch.classList.remove('hidden'); }

                results.sort((a, b) => a.time - b.time);
                UI.board.innerHTML = '';
                results.forEach((r, index) => {
                    const isLoser = index === results.length - 1;
                    const el = document.createElement('div');
                    el.className = `flex justify-between p-3 rounded font-bold ${isLoser ? 'bg-[#fff0f0] text-[#f23645]' : 'bg-white text-[#131722]'}`;
                    el.innerHTML = `<span>#${index + 1} ${r.name}</span> <span class="font-mono">${(r.time / 1000).toFixed(2)}s</span>`;
                    UI.board.appendChild(el);
                    if (isLoser) UI.loserName.textContent = r.name;
                });
            } else if (bike.finished) setTimeout(checkAllFinished, 1000); 
        }
    </script>
